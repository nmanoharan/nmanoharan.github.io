<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>nmanoharan — HealthGenie</title>
    <style>
      :root {
        color-scheme: light dark;
        --fg: #1a1a1a;
        --muted: #555;
        --bg: #f0f4f8;
        --card: #fff;
        --accent: #2563eb;
        --border: #e2e8f0;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --fg: #f1f5f9;
          --muted: #94a3b8;
          --bg: #0f172a;
          --card: #1e293b;
          --accent: #60a5fa;
          --border: #334155;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        line-height: 1.6;
        margin: 0;
        min-height: 100vh;
        padding: 2rem 1.25rem;
        color: var(--fg);
        background: var(--bg);
      }
      main {
        max-width: 36rem;
        margin: 0 auto;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 2rem 1.75rem;
      }
      h1 {
        font-size: 1.35rem;
        margin: 0 0 0.35rem;
        font-weight: 700;
      }
      .tag {
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 1.5rem;
      }
      p {
        margin: 0.75rem 0;
      }
      ul {
        margin: 1rem 0;
        padding-left: 1.2rem;
      }
      li {
        margin: 0.4rem 0;
      }
      a {
        color: var(--accent);
        font-weight: 600;
      }
      .links {
        margin-top: 1.5rem;
        padding-top: 1.25rem;
        border-top: 1px solid var(--border);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>HealthGenie</h1>
      <p class="tag">Preventive wellness prototype · nmanoharan.github.io</p>
      <p>
        Static pages for <strong>GitHub User Pages</strong>. Use the privacy policy URL in App Store Connect when you
        ship the mobile app.
      </p>
      <div class="links">
        <ul>
          <li><a href="privacy-policy.html">Privacy policy</a> — App Store privacy URL</li>
          <li>
            <a href="https://github.com/nmanoharan/healthgenie-agentic-app">healthgenie-agentic-app</a> — source
            repository
          </li>
        </ul>
      </div>
    </main>
  </body>
</html>
